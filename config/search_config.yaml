# Academic Full Search Skill Configuration
# 完整配置模板
# 使用时请修改 email 字段为你的真实邮箱（PubMed 必需）

search:
  # 启用的数据源
  enabled_sources:
    - arxiv
    - pubmed
    - biorxiv
    - medrxiv
    - chemrxiv
    - semantic_scholar
    - google_scholar
    # - researchgate  # 可选，可能触发反爬

  # 检索参数
  request_interval: 5        # 请求间隔（秒）
  max_results: 20            # 单数据源最大结果数
  max_rounds: 3              # 最大检索轮次
  time_range_days: 3650      # 默认检索时间范围（天，3650=10 年）

  # 输出参数
  output_format: "GB/T 7714-2015"  # 引用格式：GB/T 7714-2015, APA, MLA
  output_count: 20                 # 最终输出文献数量

  # PubMed 必需
  email: "your-email@example.com"  # ⚠️ 请替换为你的真实邮箱
  tool_name: "AcademicSearchSkill"

  # 高级选项
  sort_by: "relevance"           # 排序：relevance, date, citations
  include_preprints: true        # 是否包含预印本
  auto_deduplicate: true         # 自动去重

  # 数据源特定配置
  sources:
    arxiv:
      categories: []  # 限定学科分类，如 ['cs.CV', 'cs.LG']
      sort_by: "submittedDate"
    
    pubmed:
      date_range_type: "DP"  # DP=发表日期，MDAT=修改日期
    
    semantic_scholar:
      min_citations: 0       # 最小引用数过滤
      open_access_only: false  # 仅开放获取
    
    google_scholar:
      use_proxy: false       # 是否使用代理
      proxy_url: ""          # 代理地址

  # 日志配置
  logging:
    level: "INFO"            # DEBUG, INFO, WARNING, ERROR
    save_to_file: true
    log_file: "logs/search.log"
