search:
  # 启用的数据源（按优先级排序）
  enabled_sources:
    - crossref        # 高优先级 - 元数据全面、DOI 解析
    - arxiv           # 预印本 - 物理/计算机/数学
    - pubmed          # 生物医学权威
    - semantic_scholar # AI 驱动 - 引用指标
    - biorxiv         # 生物学预印本
    - medrxiv         # 医学预印本
    - chemrxiv        # 化学预印本
    # - google_scholar  # 按需启用 - Playwright 兜底
  
  # 请求控制
  request_interval: 2         # 秒 - 请求间隔
  max_results: 20             # 单平台最大结果数
  max_rounds: 3               # 最大检索轮次
  
  # 输出格式
  output_format: "GB/T 7714-2015"  # 可选：GB/T 7714-2015, APA, MLA
  
  # 必需配置
  email: "your.email@example.com"      # PubMed 必需
  mailto: "your.email@example.com"     # Crossref 推荐（提升限流阈值）
  
  # Crossref 特定配置
  crossref:
    base_url: "https://api.crossref.org/works"
    default_filters:
      - "type:journal-article"
    sort: "relevance"
    order: "desc"
  
  # arXiv 特定配置
  arxiv:
    base_url: "http://export.arxiv.org/api/query"
    default_categories: []  # 空表示全部分类
  
  # PubMed 特定配置
  pubmed:
    esearch_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi"
    efetch_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi"
    tool_name: "AcademicSearchSkill"
  
  # Semantic Scholar 特定配置
  semantic_scholar:
    base_url: "https://api.semanticscholar.org/graph/v1/paper/search"
    default_fields:
      - title
      - authors
      - year
      - abstract
      - doi
      - citationCount
      - openAccessPdf
  
  # rxiv 系列配置
  rxiv:
    base_url: "https://api.medrxiv.org/details"
    date_range_days: 365  # 检索最近 N 天
  
  # Google Scholar 配置（Playwright）
  google_scholar:
    base_url: "https://scholar.google.com/scholar"
    delay_between_requests: 1.5  # 秒

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# 缓存配置（可选）
cache:
  enabled: true
  ttl_hours: 24
  cache_dir: ".cache/academic_search"
